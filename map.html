<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portugal Interactive Map</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
        }
        body {
            background-color: #1a1a1a;
            color: #fff;
        }
        /* 顶部导航 */
        nav {
            background-color: #000;
            padding: 1.5rem 5rem;
            display: flex;
            gap: 3rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        /* 地图容器 */
        .map-container {
            position: relative;
            height: 80vh;
        }
        #map {
            height: 100%;
            width: 100%;
            background-color: #222;
        }
        /* 左侧层级菜单 */
        .layer-control {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background-color: rgba(0,0,0,0.7);
            padding: 1rem;
            z-index: 1000;
            min-width: 220px;
        }
        .layer-control h2 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            text-transform: uppercase;
        }
        .layer-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0.7rem;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid #333;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .layer-btn:hover, .layer-btn.active {
            background-color: rgba(255,165,100,0.2);
        }
        /* 底部说明栏 */
        .footer-text {
            padding: 1rem 5rem;
        }
        .join-bar {
            background-color: #557a55;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="condition.html">CONDITION</a>
        <a href="Database.html">DATABASE</a>
    </nav>

    <!-- 地图主体 -->
    <div class="map-container">
        <div id="map"></div>

        <!-- 左侧层级菜单 -->
        <div class="layer-control">
            <h2>Hierarchical Information</h2>
            <p style="font-size:0.9rem; margin-bottom:1rem; color:#aaa;">Foldable? Don't just give up. Write a short introduction instead.</p>
            <button class="layer-btn" data-layer="aquifer">AQUIFER</button>
            <button class="layer-btn" data-layer="pollution">POLLUTION</button>
            <button class="layer-btn" data-layer="rain">RAIN & FLOOD</button>
            <button class="layer-btn" data-layer="subsidence">LAND SUBSIDENCE</button>
            <button class="layer-btn" data-layer="plantation">PLANTATION</button>
            <button class="layer-btn" data-layer="pending">PENDING DETERMINATION</button>
        </div>
    </div>

    <!-- 底部说明 -->
    <div class="footer-text">
        <h3>INTERACTIVE MAP</h3>
        <p style="color:#aaa; margin:0.5rem 0;">Introduction: Just one sentence will do. write more later. Or can make it longer and then have a small box appear after the introduction.</p>
    </div>
    <div class="join-bar">WELCOME TO JOIN US!</div>

    <script>
        // 1. 初始化地图（以葡萄牙为中心）
        const map = L.map('map', {
            zoomControl: false
        }).setView([39.5, -8.0], 7); // 葡萄牙中心坐标

        // 2. 深色底图（仿暗色风格）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB Dark Matter',
            maxZoom: 19
        }).addTo(map);

        // 3. 定义图层对象（后续你可以替换为自己的GeoJSON/瓦片图层）
        const layers = {
            aquifer: null,
            pollution: null,
            rain: null,
            subsidence: null,
            plantation: null,
            pending: null
        };

        // --- 示例：道路网络图层（模拟你图中的橙色路网效果）---
        // 这里用一个简单的示例GeoJSON，你后续可以替换为真实的葡萄牙路网/数据
        const sampleRoadStyle = {
            color: '#ffaa88', // 橙色线条
            weight: 1.5,
            opacity: 0.6,
            fillOpacity: 0
        };

        // 示例：Aquifer图层（半透明蓝色）
        layers.aquifer = L.geoJSON(null, {
            style: {
                color: '#44aaff',
                weight: 0,
                fillColor: '#44aaff',
                fillOpacity: 0.3
            }
        });

        // 示例：Pollution图层（半透明红色）
        layers.pollution = L.geoJSON(null, {
            style: {
                color: '#ff4444',
                weight: 0,
                fillColor: '#ff4444',
                fillOpacity: 0.3
            }
        });

        // 你可以为每个层级添加对应的样式，后续再加载真实数据
        layers.rain = L.geoJSON(null, { style: { fillColor: '#44aaff', fillOpacity:0.3, color:'transparent' } });
        layers.subsidence = L.geoJSON(null, { style: { fillColor: '#aa44ff', fillOpacity:0.3, color:'transparent' } });
        layers.plantation = L.geoJSON(null, { style: { fillColor: '#44ff88', fillOpacity:0.3, color:'transparent' } });
        layers.pending = L.geoJSON(null, { style: { fillColor: '#888888', fillOpacity:0.3, color:'transparent' } });

        // 4. 点击按钮切换/叠加图层
        const buttons = document.querySelectorAll('.layer-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const layerName = btn.dataset.layer;
                const layer = layers[layerName];

                if (map.hasLayer(layer)) {
                    // 如果图层已存在，移除它
                    map.removeLayer(layer);
                    btn.classList.remove('active');
                } else {
                    // 如果图层不存在，添加它
                    map.addLayer(layer);
                    btn.classList.add('active');
                }
            });
        });

        // --- 后续你需要做的关键步骤 ---
        // 1. 把葡萄牙的边界/路网数据转为GeoJSON格式
        // 2. 把GeoJSON数据加载到对应的图层中，例如：
        // fetch('portugal-roads.geojson')
        //   .then(res => res.json())
        //   .then(data => {
        //       L.geoJSON(data, { style: sampleRoadStyle }).addTo(map);
        //   });
    </script>
</body>
</html>
