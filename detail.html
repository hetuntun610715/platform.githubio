<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Detail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #fff;
            margin: 0;
            padding: 0;
            position: relative;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        nav {
            background: #2c3e50;
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 12px 0;
            width: 100%;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }
        .container {
            width: 100%;
            max-width: 100%;
            padding: 20px;
            background: #fff;
        }
        .header-section {
            display: flex;
            gap: 20px;
            width: 100%;
            margin-bottom: 20px;
        }
        .main-img {
            width: 60%;
            height: auto;
            object-fit: cover;
            border: 1px solid #ccc;
        }
        .info-panel {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-panel h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .info-panel p {
            font-size: 14px;
        }
        .map-preview {
            width: 100%;
            height: 120px;
            border: 2px solid #7a9473;
            background: #e8f5e9;
            margin-top: 10px;
        }
        .section-title {
            background: #7a9473;
            color: white;
            padding: 4px 12px;
            padding-right: 35px;
            display: inline-block;
            margin: 15px 0 8px;
            font-size: 14px;
            position: relative;
        }
        .add-comment-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            color: #7a9473;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .intro-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .comment-item {
            border-top: 1px solid #333;
            padding: 10px 0;
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #7a9473;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .comment-name {
            font-weight: bold;
            font-size: 14px;
        }
        .comment-text {
            font-size: 13px;
        }
        .comment-input-container {
            margin: 10px 0;
            display: none;
        }
        .comment-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            height: 80px;
            margin-bottom: 8px;
        }
        .comment-submit {
            background: #7a9473;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .no-comment-tip {
            font-size: 13px;
            color: #999;
            padding: 10px 0;
            display: block;
        }
        footer {
            background: #7a9473;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
        }
        .back-btn {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
<nav>
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT</a>
    <a href="condition.html">CONDITION</a>
    <a href="Database.html">DATABASE</a>
</nav>

<div class="container">
    <div class="header-section">
        <img id="mainImage" class="main-img" src="" alt="Image">
        <div class="info-panel">
            <h1 id="detailTitle">TITLE</h1>
            <p id="uploader">Uploader: </p>
            <p id="category">Category: </p>
            <p id="keyword">Keyword: </p>
            <p id="obsDate">Observation Date: </p>
            <p id="obsWeather">Weather: </p>
            <p id="location">Location: </p>
            <div class="map-preview"></div>
        </div>
    </div>

    <div>
        <h2 class="section-title">Introduction</h2>
        <p class="intro-text" id="introText"></p>
    </div>

    <div>
        <h2 class="section-title">
            Dynamic
            <button class="add-comment-btn" id="addCommentBtn">+</button>
        </h2>
        <div class="comment-input-container" id="commentInputContainer">
            <textarea class="comment-input" id="commentContent" placeholder="Add your comment..."></textarea>
            <button class="comment-submit" id="commentSubmitBtn">Submit</button>
        </div>
        <div id="commentList">
            <span class="no-comment-tip">No comments yet</span>
        </div>
    </div>
</div>

<button class="back-btn" id="backBtn">Back</button>
<footer>WELCOME TO JOIN US!</footer>

<script>
    // ✅ 核心：从哪进回哪，不会固定list
    const fromPage = localStorage.getItem('fromPage');
    // 优先读记录，没有才默认list
    const backTo = fromPage || 'database list.html';

    document.getElementById('backBtn').addEventListener('click', () => {
        location.href = backTo;
    });

    // 加载数据
    const index = localStorage.getItem('currentDetailIndex');
    const allData = JSON.parse(localStorage.getItem('dataList') || '[]');
    const data = allData[index];
    if (!data) {
        alert('Data not found');
        location.href = 'database list.html';
    }

    document.getElementById('mainImage').src = data.files?.[0] || '';
    document.getElementById('detailTitle').innerText = data.title || 'No Title';
    document.getElementById('uploader').innerText = 'Uploader: ' + (data.uploader || '');
    document.getElementById('category').innerText = 'Category: ' + (data.category || '');
    document.getElementById('keyword').innerText = 'Keyword: ' + (data.keyword || '');
    document.getElementById('obsDate').innerText = 'Observation Date: ' + (data.date || '');
    document.getElementById('obsWeather').innerText = 'Weather: ' + (data.weather || '');
    document.getElementById('location').innerText = 'Location: ' + (data.location || '');
    document.getElementById('introText').innerText = data.brief || 'No introduction';

    // 用户名
    const currentUser = localStorage.getItem('username') || 'Guest';

    // 评论（修复旧乱数据）
    const commentKey = `comments_${index}`;
    let raw = localStorage.getItem(commentKey);
    let comments = [];
    if (raw) {
        try {
            let temp = JSON.parse(raw);
            if (Array.isArray(temp) && typeof temp[0] === 'string') {
                comments = temp.map(t => ({ username: 'Guest', text: t }));
            } else {
                comments = temp;
            }
        } catch (e) {
            comments = [];
        }
    }

    const addCommentBtn = document.getElementById('addCommentBtn');
    const commentInputContainer = document.getElementById('commentInputContainer');
    const commentContent = document.getElementById('commentContent');
    const commentSubmitBtn = document.getElementById('commentSubmitBtn');
    const commentList = document.getElementById('commentList');

    function renderComments() {
        commentList.innerHTML = '';
        if (comments.length === 0) {
            commentList.innerHTML = '<span class="no-comment-tip">No comments yet</span>';
            return;
        }
        comments.forEach(c => {
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `
                <div class="comment-header">
                    <div class="comment-avatar">👤</div>
                    <div class="comment-name">${c.username}</div>
                </div>
                <p class="comment-text">${c.text}</p>
            `;
            commentList.appendChild(item);
        });
    }

    addCommentBtn.addEventListener('click', () => {
        commentInputContainer.style.display = commentInputContainer.style === 'block' ? 'none' : 'block';
    });

    commentSubmitBtn.addEventListener('click', () => {
        const text = commentContent.value.trim();
        if (!text) return;
        comments.push({ username: currentUser, text: text });
        localStorage.setItem(commentKey, JSON.stringify(comments));
        commentContent.value = '';
        commentInputContainer.style.display = 'none';
        renderComments();
    });

    renderComments();
</script>
</body>
</html>
